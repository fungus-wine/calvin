<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="stylesheet" href="assets/css/custom.css">
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen">

  <!-- Navigation -->
  <nav class="bg-gray-900 border-b border-gray-800 sticky top-0 z-50">
    <div class="max-w-5xl mx-auto px-6 py-3 flex items-center gap-8">
      <a href="index.html" class="font-bold text-orange-400 text-lg tracking-tight">CALVIN</a>
      <div class="flex gap-6 text-sm text-gray-300">
        <a href="index.html" class="hover:text-orange-400 transition-colors">Home</a>
        <a href="mechanical.html" class="hover:text-orange-400 transition-colors">Mechanical</a>
        <a href="hardware.html" class="hover:text-orange-400 transition-colors">Hardware</a>
        <a href="software.html" class="hover:text-orange-400 transition-colors">Software</a>
        <a href="gallery.html" class="hover:text-orange-400 transition-colors">Gallery</a>
        <a href="build-log.html" class="nav-active">Build Log</a>
      </div>
    </div>
  </nav>

  <!-- AI stub warning -->
  <div class="max-w-5xl mx-auto px-6 pt-6">
    <div class="bg-gray-900/40 border border-gray-800 rounded-xl px-4 py-3 text-gray-500 text-sm text-center">
      AI-generated stub — much of the information on this site is incorrect or placeholder.
    </div>
  </div>

  <!-- Page header -->
  <header class="max-w-5xl mx-auto px-6 pt-14 pb-10">
    <p class="text-orange-400 text-sm font-semibold tracking-widest uppercase mb-2">Progress</p>
    <h1 class="text-4xl font-bold mb-4">Build Log</h1>
    <p class="text-gray-400 text-lg max-w-2xl">
      A running record of Calvin's construction and development — newest entries first.
    </p>
  </header>

  <main class="max-w-3xl mx-auto px-6 pb-20">

    <!--
      HOW TO ADD A BUILD LOG ENTRY:
      1. Create posts/YYYY-MM-DD.md with frontmatter + markdown body
      2. Add the filename (newest first) to posts/index.json

      Frontmatter fields:
        date:      YYYY-MM-DD or YYYY-MM-DDTHH:MM  (required, time used for ordering only)
        title:     Entry title                      (optional)
        tag:       Optional label                   (optional)
        image:     assets/images/photo.jpg          (optional)
        image_alt: Description                      (optional)
    -->

    <div id="posts-container"></div>

  </main>

  <script>
    function parseFrontmatter(text) {
      const match = text.match(/^---\n([\s\S]*?)\n---\n([\s\S]*)$/);
      if (!match) return { meta: {}, body: text };
      const meta = Object.fromEntries(
        match[1].split('\n').map(line => {
          const i = line.indexOf(':');
          return [line.slice(0, i).trim(), line.slice(i + 1).trim()];
        })
      );
      return { meta, body: match[2] };
    }

    function renderPost({ meta, body }) {
      const tag = meta.tag
        ? `<span class="text-xs text-gray-600 bg-gray-900 border border-gray-800 px-2 py-0.5 rounded-full">${meta.tag}</span>`
        : '';
      const image = meta.image
        ? `<img src="${meta.image}" alt="${meta.image_alt || ''}" class="rounded-xl border border-gray-700 mt-4 w-full">`
        : '';
      return `
        <article class="build-entry mb-12">
          <div class="flex items-center gap-3 mb-1">
            <span class="w-3 h-3 rounded-full bg-orange-400 shrink-0 -ml-[1.6875rem] ring-4 ring-gray-950"></span>
            <span class="text-sm text-orange-400 font-mono">${meta.date.slice(0, 10)}</span>
            ${tag}
          </div>
          ${meta.title ? `<h2 class="text-lg font-bold text-gray-100 mt-3 mb-4">${meta.title}</h2>` : ''}
          <div class="prose-log">${marked.parse(body.trim())}</div>
          ${image}
        </article>`;
    }

    async function loadPosts() {
      const container = document.getElementById('posts-container');
      try {
        const index = await fetch('posts/index.json').then(r => r.json());
        const texts = await Promise.all(index.map(f => fetch(`posts/${f}`).then(r => r.text())));
        const posts = texts.map(parseFrontmatter).sort((a, b) => a.meta.date.localeCompare(b.meta.date)).reverse();
        container.innerHTML = posts.map(renderPost).join('');
      } catch (e) {
        container.innerHTML = '<p class="text-gray-600 text-sm text-center py-16">Could not load posts. Serve locally with: python3 -m http.server 8080</p>';
      }
    }

    loadPosts();
  </script>

  <!-- Footer -->
  <footer class="border-t border-gray-800 py-8 text-center text-gray-600 text-sm">
    <div class="max-w-5xl mx-auto px-6">
      Calvin Robot Project &nbsp;·&nbsp;
      <a href="https://github.com/fungus-wine" target="_blank" rel="noopener"
         class="hover:text-gray-400 transition-colors">GitHub</a>
    </div>
  </footer>

</body>
</html>
